<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Hive</title>
    <style>
        html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
        #term { width: 100vw; height: 100vh; padding: 6px; box-sizing: border-box; }
        #status {
            position: fixed; right: 10px; bottom: 6px;
            font: 11px Menlo, monospace; color: #888; pointer-events: none;
            background: rgba(0,0,0,0.5); padding: 2px 6px; border-radius: 3px;
        }
        #status.error { color: #ff7a7a; }
    </style>
</head>
<body>
<div id="term"></div>
<div id="status">connecting…</div>
<script src="./src/main.js" type="module"></script>
</body>
</html>
