name: CI (Linux)

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build, Vet & Test (Linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Seed frontend/dist
        # wails generate module compiles the Go package, which hits
        # the //go:embed all:frontend/dist directive in main.go. Seed
        # an empty dist/ so the embed has something to read; the real
        # vite build overwrites it below.
        run: mkdir -p cmd/hivegui/frontend/dist && echo placeholder > cmd/hivegui/frontend/dist/.placeholder

      - name: Install Wails CLI
        # wails generate module produces cmd/hivegui/frontend/wailsjs/,
        # which main.js imports. Without this step the vite build can't
        # resolve "../wailsjs/go/main/App".
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Generate Wails bindings
        working-directory: cmd/hivegui
        run: wails generate module

      - name: Build frontend
        # cmd/hivegui/main.go embeds frontend/dist via go:embed, so the
        # dist tree must exist before any `go build` / `go vet` / `go test`.
        working-directory: cmd/hivegui/frontend
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test (Go)
        run: go test ./...
        env:
          TERM: dumb  # deterministic golden file output (no ANSI colors)

      - name: Test (Go e2e — real hived binary)
        # Layer A: spawns the real hived binary in temp dirs and drives
        # it over the real wire protocol. Isolation enforced by env
        # vars below + testclient.RequireIsolation; never touches real
        # hive state. See docs/exec-plans/active/210-real-e2e-tests.md.
        run: |
          export HOME="$(mktemp -d)"
          export HIVE_STATE_DIR="$(mktemp -d)"
          export HIVE_SOCKET="$(mktemp -d)/hived.sock"
          go test -tags=e2e -timeout 180s ./cmd/hived/...
        env:
          TERM: dumb

      - name: Test (frontend unit + DOM)
        working-directory: cmd/hivegui/frontend
        run: ./node_modules/.bin/vitest run

      - name: Install Playwright browsers
        working-directory: cmd/hivegui/frontend
        run: ./node_modules/.bin/playwright install --with-deps chromium

      - name: Test (frontend E2E)
        working-directory: cmd/hivegui/frontend
        run: ./node_modules/.bin/playwright test
        env:
          CI: 'true'
